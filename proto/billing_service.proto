// ============================================================================
// CUSTOMER SERVICE
// ============================================================================

// CustomerType defines the billing category of a customer
enum CustomerType {
  CASH = 0;
  COMPANY = 1;
  MASM = 2;
  COMPANY_WITH_CASH_RATE = 3;
}

// Customer represents a billing customer (insurer, company, or cash patient group)
message Customer {
  int32 id = 1;
  string name = 2;
  CustomerType type = 3;
  int32 price_list_id = 4;
  string phone = 5;
  string email = 6;
  string address = 7;
  string contact_person = 8;
  bool is_active = 9;
  string notes = 10;
  string created_at = 11;
  string updated_at = 12;
}

service CustomerService {
  rpc CreateCustomer (CreateCustomerRequest) returns (CreateCustomerResponse) {
    option (google.api.http) = { post: "/v1/customers" body: "*" };
  }
  rpc GetCustomer (GetCustomerRequest) returns (GetCustomerResponse) {
    option (google.api.http) = { get: "/v1/customers/{id}" };
  }
  rpc UpdateCustomer (UpdateCustomerRequest) returns (UpdateCustomerResponse) {
    option (google.api.http) = { put: "/v1/customers/{id}" body: "*" };
  }
  rpc DeleteCustomer (DeleteCustomerRequest) returns (DeleteCustomerResponse) {
    option (google.api.http) = { delete: "/v1/customers/{id}" };
  }
  rpc ListCustomers (ListCustomersRequest) returns (ListCustomersResponse) {
    option (google.api.http) = { get: "/v1/customers" };
  }
}

message CreateCustomerRequest {
  string name = 1;
  CustomerType type = 2;
  int32 price_list_id = 3;
  string phone = 4;
  string email = 5;
  string address = 6;
  string contact_person = 7;
  bool is_active = 8;
  string notes = 9;
}

message CreateCustomerResponse {
  int32 id = 1;
  bool success = 2;
  string message = 3;
}

message GetCustomerRequest {
  int32 id = 1;
}

message GetCustomerResponse {
  Customer customer = 1;
}

message UpdateCustomerRequest {
  int32 id = 1;
  string name = 2;
  CustomerType type = 3;
  int32 price_list_id = 4;
  string phone = 5;
  string email = 6;
  string address = 7;
  string contact_person = 8;
  bool is_active = 9;
  string notes = 10;
}

message UpdateCustomerResponse {
  bool success = 1;
  string message = 2;
}

message DeleteCustomerRequest {
  int32 id = 1;
}

message DeleteCustomerResponse {
  bool success = 1;
  string message = 2;
}

message ListCustomersRequest {
  bool active_only = 1;
  CustomerType type_filter = 2;
  string search = 3;
}

message ListCustomersResponse {
  repeated Customer customers = 1;
}