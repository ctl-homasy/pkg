// supply_chain_service.proto

syntax = "proto3";

package supply_chain;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "./shared/supply-chain-service/proto";

// Common message for items in the supply chain
message StockItem {
  string id = 1 [json_name="id"];
  string name = 2 [json_name="name"];
  string description = 3 [json_name="description"];
  string sku = 4 [json_name="sku"];
  string barcode = 5 [json_name="barcode"];
  string unit_of_measure = 6 [json_name="unitOfMeasure"];
  double reorder_level = 8 [json_name="reorderLevel"];
  double minimum_level = 9 [json_name="minimumLevel"];
  double maximum_level = 10 [json_name="maximumLevel"];
  double unit_cost = 11 [json_name="unitCost"];
  double unit_price = 12 [json_name="unitPrice"];
  double tax_rate = 13 [json_name="taxRate"];
  bool is_active = 14 [json_name="isActive"];
  bool expiry_tracking = 15 [json_name="expiryTracking"];
  bool batch_tracking = 16 [json_name="batchTracking"];
  string category = 17 [json_name="category"];
  double markup_percentage = 18 [json_name="markupPercentage"]; // Markup percentage for calculating unit_price from unit_cost
  string created_at = 19 [json_name="createdAt"];
  string updated_at = 20 [json_name="updatedAt"];
  double quantity_in_store = 21 [json_name="quantityInStore"];
  string bin_location = 22 [json_name="binLocation"];
}

// Message for a store location
message Store {
  string id = 1 [json_name="id"];
  string name = 2 [json_name="name"];
  string location = 3 [json_name="location"];
  string type = 4 [json_name="type"];
  bool is_active = 5 [json_name="isActive"];
  string created_at = 6 [json_name="createdAt"];
  string updated_at = 7 [json_name="updatedAt"];
}

// Message for a supplier
message Supplier {
  string id = 1 [json_name="id"];
  string name = 2 [json_name="name"];
  string contact_person = 3 [json_name="contactPerson"];
  string phone = 4 [json_name="phone"];
  string email = 5 [json_name="email"];
  string address = 6 [json_name="address"];
  bool is_active = 7 [json_name="isActive"];
  string created_at = 8 [json_name="createdAt"];
  string updated_at = 9 [json_name="updatedAt"];
}

// Message for requisition items
message RequisitionItem {
  string item_id = 1 [json_name="itemId"];
  string item_name = 2 [json_name="itemName"];
  double quantity_requested = 3 [json_name="quantityRequested"];
  double quantity_approved = 4 [json_name="quantityApproved"];
  string unit_of_measure = 5 [json_name="unitOfMeasure"];
  double estimated_unit_price = 6 [json_name="estimatedUnitPrice"];
  string notes = 7 [json_name="notes"];
}

// Message for requisition
message Requisition {
  string id = 1 [json_name="id"];
  string requisition_number = 2 [json_name="requisitionNumber"];
  string requestor_id = 3 [json_name="requestorId"];
  string requestor_name = 4 [json_name="requestorName"];
  string requestor_signature = 5 [json_name="requestorSignature"];
  string requesting_store_id = 6 [json_name="requestingStoreId"];
  string requesting_store_name = 7 [json_name="requestingStoreName"];
  string supplier_id = 8 [json_name="supplierId"];
  string supplier_name = 9 [json_name="supplierName"];
  string status = 10 [json_name="status"];
  string approver_id = 11 [json_name="approverId"];
  string approver_name = 12 [json_name="approverName"];
  string approver_signature = 13 [json_name="approverSignature"];
  string approval_date = 14 [json_name="approvalDate"];
  string notes = 15 [json_name="notes"];
  string created_at = 16 [json_name="createdAt"];
  string updated_at = 17 [json_name="updatedAt"];
  repeated RequisitionItem items = 18 [json_name="items"];
  string tracking_id = 19 [json_name="trackingId"];
}

// Message for LPO items
message LPOItem {
  string item_id = 1 [json_name="itemId"];
  string item_name = 2 [json_name="itemName"];
  double quantity_requested = 3 [json_name="quantityRequested"];
  string unit_of_measure = 4 [json_name="unitOfMeasure"];
}

// Message for LPO (Local Purchase Order)
message LocalPurchaseOrder {
  string id = 1 [json_name="id"];
  string lpo_number = 2 [json_name="lpoNumber"];
  string requisition_id = 3 [json_name="requisitionId"];
  string requisition_number = 4 [json_name="requisitionNumber"];
  string supplier_id = 5 [json_name="supplierId"];
  string supplier_name = 6 [json_name="supplierName"];
  string store_id = 7 [json_name="storeId"];
  string store_name = 8 [json_name="storeName"];
  string status = 9 [json_name="status"];
  string authorizer_id = 10 [json_name="authorizerId"];
  string authorizer_name = 11 [json_name="authorizerName"];
  string authorizer_signature = 12 [json_name="authorizerSignature"];
  string authorization_date = 13 [json_name="authorizationDate"];
  string created_at = 14 [json_name="createdAt"];
  string updated_at = 15 [json_name="updatedAt"];
  repeated LPOItem items = 16 [json_name="items"];
}

// Message for Goods Received Note (GRN)
message GoodsReceivedNote {
  string id = 1 [json_name="id"];
  string grn_number = 2 [json_name="grnNumber"];
  string lpo_id = 3 [json_name="lpoId"];
  string lpo_number = 4 [json_name="lpoNumber"];
  string supplier_id = 5 [json_name="supplierId"];
  string supplier_name = 6 [json_name="supplierName"];
  string store_id = 7 [json_name="storeId"];
  string store_name = 8 [json_name="storeName"];
  string delivery_note_number = 9 [json_name="deliveryNoteNumber"];
  string invoice_number = 10 [json_name="invoiceNumber"];
  string status = 11 [json_name="status"];
  string receiver_id = 12 [json_name="receiverId"];
  string receiver_name = 13 [json_name="receiverName"];
  string receiver_signature = 14 [json_name="receiverSignature"];
  string checker_id = 15 [json_name="checkerId"];
  string checker_name = 16 [json_name="checkerName"];
  string check_date = 17 [json_name="checkDate"];
  string notes = 18 [json_name="notes"];
  string created_at = 19 [json_name="createdAt"];
  string updated_at = 20 [json_name="updatedAt"];
  repeated GoodsReceivedItem items = 21 [json_name="items"];
  double total_cost = 22 [json_name="totalCost"];
}

// Message for items in GRN
message GoodsReceivedItem {
  string item_id = 1 [json_name="itemId"];
  string item_name = 2 [json_name="itemName"];
  double ordered_quantity = 3 [json_name="orderedQuantity"];
  double received_quantity = 4 [json_name="receivedQuantity"]; 
  double accepted_quantity = 5 [json_name="acceptedQuantity"];
  double rejected_quantity = 6 [json_name="rejectedQuantity"];
  string rejection_reason = 7 [json_name="rejectionReason"];
  string unit_of_measure = 8 [json_name="unitOfMeasure"];
  string batch_number = 9 [json_name="batchNumber"];
  string expiry_date = 10 [json_name="expiryDate"];
  string bin_number = 11 [json_name="binNumber"];
  string notes = 12 [json_name="notes"];
  double unit_cost = 13 [json_name="unitCost"];
  double total_cost = 14 [json_name="totalCost"];
}

// Message for stock adjustment
message StockAdjustment {
  string id = 1 [json_name="id"];
  string adjustment_number = 2 [json_name="adjustmentNumber"];
  string store_id = 3 [json_name="storeId"];
  string store_name = 4 [json_name="storeName"];
  string reason = 5 [json_name="reason"];
  string notes = 6 [json_name="notes"];
  string status = 7 [json_name="status"];
  string authorizer_id = 8 [json_name="authorizerId"];
  string authorizer_name = 9 [json_name="authorizerName"];
  string authorizer_signature = 10 [json_name="authorizerSignature"];
  string created_at = 11 [json_name="createdAt"];
  string updated_at = 12 [json_name="updatedAt"];
  repeated StockAdjustmentItem items = 13 [json_name="items"];
}

// Message for stock adjustment items
message StockAdjustmentItem {
  string item_id = 1 [json_name="itemId"];
  string item_name = 2 [json_name="itemName"];
  double adjusted_quantity = 4 [json_name="adjustedQuantity"];
  string unit_of_measure = 5 [json_name="unitOfMeasure"];
  string notes = 6 [json_name="notes"];
}

// Message for inter-store transfer
message InterStoreTransfer {
  string id = 1 [json_name="id"];
  string transfer_number = 2 [json_name="transferNumber"];
  string source_store_id = 3 [json_name="sourceStoreId"];
  string source_store_name = 4 [json_name="sourceStoreName"];
  string destination_store_id = 5 [json_name="destinationStoreId"];
  string destination_store_name = 6 [json_name="destinationStoreName"];
  string status = 7 [json_name="status"];
  string requestor_id = 8 [json_name="requestorId"];
  string requestor_name = 9 [json_name="requestorName"];
  string requestor_signature = 10 [json_name="requestorSignature"];
  string approver_id = 11 [json_name="approverId"];
  string approver_name = 12 [json_name="approverName"];
  string approver_signature = 13 [json_name="approverSignature"];
  string receiver_id = 14 [json_name="receiverId"];
  string receiver_name = 15 [json_name="receiverName"];
  string receiver_signature = 16 [json_name="receiverSignature"];
  string reason = 17 [json_name="reason"];
  string notes = 18 [json_name="notes"];
  string created_at = 19 [json_name="createdAt"];
  string updated_at = 20 [json_name="updatedAt"];
  repeated InterStoreTransferItem items = 21 [json_name="items"];
}

// Message for inter-store transfer items
message InterStoreTransferItem {
  string item_id = 1 [json_name="itemId"];
  string item_name = 2 [json_name="itemName"];
  double transfer_quantity = 4 [json_name="transferQuantity"];
  double received_quantity = 5 [json_name="receivedQuantity"];
  string unit_of_measure = 6 [json_name="unitOfMeasure"];
  string notes = 7 [json_name="notes"];
  string bin_location = 8 [json_name="binLocation"];
}

// Message for credit note
message CreditNote {
  string id = 1;
  string credit_note_number = 2;
  string grn_id = 3;
  string grn_number = 4;
  string supplier_id = 5;
  string supplier_name = 6;
  string store_id = 7;
  string store_name = 8;
  string issuer_id = 9;
  string issuer_name = 10;
  string issuer_signature = 11;
  string approver_id = 12;
  string approver_name = 13;
  string approver_signature = 14;
  string reason = 15;
  string notes = 16;
  string status = 17;
  string created_at = 18;
  string updated_at = 19;
  repeated CreditNoteItem items = 20;
  double total_value = 21;
}

// Message for credit note items
message CreditNoteItem {
  string item_id = 1;
  string item_name = 2;
  double received_quantity = 3;
  double accepted_quantity = 4;
  double return_quantity = 5;
  string unit_of_measure = 6;
  string batch_number = 7;
  string expiry_date = 8;
  string reason = 9;
  string notes = 10;
  double unit_price = 11;
  double total_value = 12;
}

message PriceList {
    int32 id = 1;
    string name = 2;
    string description = 3;
    bool is_active = 4;
    google.protobuf.Timestamp created_at = 5;
}

message PriceListItem {
    int32 id = 1;
    int32 price_list_id = 2;
    int32 stock_item_id = 3;
    double selling_price = 4;
    google.protobuf.Timestamp valid_from = 5;
    google.protobuf.Timestamp valid_to = 6;
}

message MedicalScheme {
    int32 id = 1;
    string name = 2;
    int32 customer_id = 3;
    bool is_active = 4;
    double coverage_percentage = 5;        // Percentage covered by scheme (0-100)
    bool covers_consultation = 6;          // Whether scheme covers consultations
    bool covers_medication = 7;            // Whether scheme covers medications
    bool covers_laboratory = 8;            // Whether scheme covers lab tests
    double annual_limit = 9;               // Annual coverage limit per patient
    double consultation_limit = 10;        // Limit per consultation
    double copay_percentage = 11;          // Patient copayment percentage
    double copay_fixed_amount = 12;        // Fixed copayment amount
}

message ReduceStockItemRequest {
    int32 stock_item_id = 1;
    double quantity = 2;
}

message ReduceStockItemResponse {
    int32 stock_item_id = 1;
    double quantity = 2;
}

message ReduceStockFromStoreRequest {
    string stock_item_id = 1;
    string store_id = 2;
    double quantity = 3;
}

message ReduceStockFromStoreResponse {
    bool success = 1;
    string message = 2;
}

// Request and Response messages for Manual Stock Update
message ManualStockUpdateRequest {
    string store_id = 1;
    string item_id = 2;
    string category = 3;
    double quantity = 4; // Use positive values to increase, negative to decrease
}

message ManualStockUpdateResponse {
    bool success = 1;
    string message = 2;
}

service SupplyChainService {
  // Stock Item Management
  rpc CreateStockItem (CreateStockItemRequest) returns (CreateStockItemResponse) {
    option (google.api.http) = {
      post: "/v1/stock-items"
      body: "*"
    };
  }
  
  rpc GetStockItem (GetStockItemRequest) returns (GetStockItemResponse) {
    option (google.api.http) = {
      get: "/v1/stock-items/{id}"
    };
  }
  
  rpc UpdateStockItem (UpdateStockItemRequest) returns (UpdateStockItemResponse) {
    option (google.api.http) = {
      put: "/v1/stock-items/{id}"
      body: "*"
    };
  }

  rpc DeleteStockItem (DeleteStockItemRequest) returns (DeleteStockItemResponse) {
    option (google.api.http) = {
      delete: "/v1/stock-items/{id}"
    };
  }

  rpc ReduceStockItem (ReduceStockItemRequest) returns (ReduceStockItemResponse) {
    option (google.api.http) = {
      post: "/v1/stock-items/reduce"
      body: "*"
    };
  }

  rpc ReduceStockFromStore (ReduceStockFromStoreRequest) returns (ReduceStockFromStoreResponse) {
    option (google.api.http) = {
      post: "/v1/stock-items/reduce-from-store"
      body: "*"
    };
  }

  // Manual Stock Update
  rpc ManualStockUpdate (ManualStockUpdateRequest) returns (ManualStockUpdateResponse) {
    option (google.api.http) = {
      post: "/v1/stock-items/manual-update"
      body: "*"
    };
  }

  rpc ListStockItems (ListStockItemsRequest) returns (ListStockItemsResponse) {
    option (google.api.http) = {
      get: "/v1/stock-items"
    };
  }
  
  rpc GetStockLevels (GetStockLevelsRequest) returns (GetStockLevelsResponse) {
    option (google.api.http) = {
      get: "/v1/stock-levels"
    };
  }
  
  rpc GetExpiringItems (GetExpiringItemsRequest) returns (GetExpiringItemsResponse) {
    option (google.api.http) = {
      get: "/v1/expiring-items"
    };
  }
  
  rpc GetItemsBelowReorderLevel (GetItemsBelowReorderLevelRequest) returns (GetItemsBelowReorderLevelResponse) {
    option (google.api.http) = {
      get: "/v1/low-stock-items"
    };
  }
  
  // Store Management
  rpc CreateStore (CreateStoreRequest) returns (CreateStoreResponse) {
    option (google.api.http) = {
      post: "/v1/stores"
      body: "*"
    };
  }
  
  rpc ListStores (ListStoresRequest) returns (ListStoresResponse) {
    option (google.api.http) = {
      get: "/v1/stores"
    };
  }

  rpc GetStore (GetStoreRequest) returns (GetStoreResponse) {
    option (google.api.http) = {
      get: "/v1/stores/{id}"
    };
  }

  rpc UpdateStore (UpdateStoreRequest) returns (UpdateStoreResponse) {
    option (google.api.http) = {
      put: "/v1/stores/{id}",
      body: "store"
    };
  }

  rpc DeleteStore (DeleteStoreRequest) returns (DeleteStoreResponse) {
    option (google.api.http) = {
      delete: "/v1/stores/{id}"
    };
  }
  
  // Supplier Management
  rpc CreateSupplier (CreateSupplierRequest) returns (CreateSupplierResponse) {
    option (google.api.http) = {
      post: "/v1/suppliers",
      body: "supplier"
    };
  }
  
  rpc ListSuppliers (ListSuppliersRequest) returns (ListSuppliersResponse) {
    option (google.api.http) = {
      get: "/v1/suppliers"
    };
  }

  rpc GetSupplier (GetSupplierRequest) returns (GetSupplierResponse) {
    option (google.api.http) = {
      get: "/v1/suppliers/{id}"
    };
  }

  rpc UpdateSupplier (UpdateSupplierRequest) returns (UpdateSupplierResponse) {
    option (google.api.http) = {
      put: "/v1/suppliers/{id}",
      body: "supplier"
    };
  }

  rpc DeleteSupplier (DeleteSupplierRequest) returns (DeleteSupplierResponse) {
    option (google.api.http) = {
      delete: "/v1/suppliers/{id}"
    };
  }
  
  // Requisition Management
  rpc CreateRequisition (CreateRequisitionRequest) returns (CreateRequisitionResponse) {
    option (google.api.http) = {
      post: "/v1/requisitions"
      body: "*"
    };
  }
  
  rpc ApproveRequisition (ApproveRequisitionRequest) returns (ApproveRequisitionResponse) {
    option (google.api.http) = {
      post: "/v1/requisitions/{id}/approve"
      body: "*"
    };
  }
  
  rpc RejectRequisition (RejectRequisitionRequest) returns (RejectRequisitionResponse) {
    option (google.api.http) = {
      post: "/v1/requisitions/{id}/reject"
      body: "*"
    };
  }
  
  rpc GetRequisition (GetRequisitionRequest) returns (GetRequisitionResponse) {
    option (google.api.http) = {
      get: "/v1/requisitions/{id}"
    };
  }
  
  rpc ListRequisitions (ListRequisitionsRequest) returns (ListRequisitionsResponse) {
    option (google.api.http) = {
      get: "/v1/requisitions"
    };
  }
  
  // LPO Management
  rpc CreateLPO (CreateLPORequest) returns (CreateLPOResponse) {
    option (google.api.http) = {
      post: "/v1/lpos"
      body: "*"
    };
  }
  
  rpc ApproveLPO (ApproveLPORequest) returns (ApproveLPOResponse) {
    option (google.api.http) = {
      post: "/v1/lpos/{id}/approve"
      body: "*"
    };
  }
  
  rpc RejectLPO (RejectLPORequest) returns (RejectLPOResponse) {
    option (google.api.http) = {
      post: "/v1/lpos/{id}/reject"
      body: "*"
    };
  }
  
  rpc GetLPO (GetLPORequest) returns (GetLPOResponse) {
    option (google.api.http) = {
      get: "/v1/lpos/{id}"
    };
  }
  
  rpc ListLPOs (ListLPOsRequest) returns (ListLPOsResponse) {
    option (google.api.http) = {
      get: "/v1/lpos"
    };
  }
  
  // GRN Management
  rpc CreateGRN (CreateGRNRequest) returns (CreateGRNResponse) {
    option (google.api.http) = {
      post: "/v1/grns"
      body: "*"
    };
  }
  
  rpc PerformQualityCheck (PerformQualityCheckRequest) returns (PerformQualityCheckResponse) {
    option (google.api.http) = {
      post: "/v1/grns/{id}/quality-check"
      body: "*"
    };
  }
  
  rpc GetGRN (GetGRNRequest) returns (GetGRNResponse) {
    option (google.api.http) = {
      get: "/v1/grns/{id}"
    };
  }
  
  rpc ListGRNs (ListGRNsRequest) returns (ListGRNsResponse) {
    option (google.api.http) = {
      get: "/v1/grns"
    };
  }
  
  // Stock Adjustment
  rpc CreateStockAdjustment (CreateStockAdjustmentRequest) returns (CreateStockAdjustmentResponse) {
    option (google.api.http) = {
      post: "/v1/stock-adjustments"
      body: "*"
    };
  }

  rpc ListStockAdjustments (ListStockAdjustmentsRequest) returns (ListStockAdjustmentsResponse) {
    option (google.api.http) = {
      get: "/v1/stock-adjustments"
    };
  }
  
  rpc ApproveStockAdjustment (ApproveStockAdjustmentRequest) returns (ApproveStockAdjustmentResponse) {
    option (google.api.http) = {
      post: "/v1/stock-adjustments/{id}/approve"
      body: "*"
    };
  }
  
  rpc RejectStockAdjustment (RejectStockAdjustmentRequest) returns (RejectStockAdjustmentResponse) {
    option (google.api.http) = {
      post: "/v1/stock-adjustments/{id}/reject"
      body: "*"
    };
  }
  
  rpc GetStockAdjustment (GetStockAdjustmentRequest) returns (GetStockAdjustmentResponse) {
    option (google.api.http) = {
      get: "/v1/stock-adjustments/{id}"
    };
  }
  
  // Inter-Store Transfer
  rpc CreateInterStoreTransfer (CreateInterStoreTransferRequest) returns (CreateInterStoreTransferResponse) {
    option (google.api.http) = {
      post: "/v1/inter-store-transfers"
      body: "*"
    };
  }
  
  rpc ApproveInterStoreTransfer (ApproveInterStoreTransferRequest) returns (ApproveInterStoreTransferResponse) {
    option (google.api.http) = {
      post: "/v1/inter-store-transfers/{id}/approve"
      body: "*"
    };
  }
  
  rpc RejectInterStoreTransfer (RejectInterStoreTransferRequest) returns (RejectInterStoreTransferResponse) {
    option (google.api.http) = {
      post: "/v1/inter-store-transfers/{id}/reject"
      body: "*"
    };
  }
  
  rpc ReceiveInterStoreTransfer (ReceiveInterStoreTransferRequest) returns (ReceiveInterStoreTransferResponse) {
    option (google.api.http) = {
      post: "/v1/inter-store-transfers/{id}/receive"
      body: "*"
    };
  }
  
  rpc GetInterStoreTransfer (GetInterStoreTransferRequest) returns (GetInterStoreTransferResponse) {
    option (google.api.http) = {
      get: "/v1/inter-store-transfers/{id}"
    };
  }
  
  rpc ListInterStoreTransfers (ListInterStoreTransfersRequest) returns (ListInterStoreTransfersResponse) {
    option (google.api.http) = {
      get: "/v1/inter-store-transfers"
    };
  }
  
  // Credit Notes
  rpc CreateCreditNote (CreateCreditNoteRequest) returns (CreateCreditNoteResponse) {
    option (google.api.http) = {
      post: "/v1/credit-notes"
      body: "*"
    };
  }
  
  rpc ApproveCreditNote (ApproveCreditNoteRequest) returns (ApproveCreditNoteResponse) {
    option (google.api.http) = {
      post: "/v1/credit-notes/{id}/approve"
      body: "*"
    };
  }
  
  rpc GetCreditNote (GetCreditNoteRequest) returns (GetCreditNoteResponse) {
    option (google.api.http) = {
      get: "/v1/credit-notes/{id}"
    };
  }
  
  rpc ListCreditNotes (ListCreditNotesRequest) returns (ListCreditNotesResponse) {
    option (google.api.http) = {
      get: "/v1/credit-notes"
    };
  }

  // Price List Management
  rpc CreatePriceList (CreatePriceListRequest) returns (CreatePriceListResponse) {
    option (google.api.http) = {
      post: "/v1/price-lists"
      body: "*"
    };
  }

  rpc GetPriceList (GetPriceListRequest) returns (GetPriceListResponse) {
    option (google.api.http) = {
      get: "/v1/price-lists/{id}"
    };
  }

  rpc UpdatePriceList (UpdatePriceListRequest) returns (UpdatePriceListResponse) {
    option (google.api.http) = {
      put: "/v1/price-lists/{id}"
      body: "*"
    };
  }

  rpc ListPriceLists (ListPriceListsRequest) returns (ListPriceListsResponse) {
    option (google.api.http) = {
      get: "/v1/price-lists"
    };
  }

  // Price List Item Management
  rpc CreatePriceListItem (CreatePriceListItemRequest) returns (CreatePriceListItemResponse) {
    option (google.api.http) = {
      post: "/v1/price-list-items"
      body: "*"
    };
  }

  rpc GetPriceListItem (GetPriceListItemRequest) returns (GetPriceListItemResponse) {
    option (google.api.http) = {
      get: "/v1/price-list-items/{id}"
    };
  }

  rpc UpdatePriceListItem (UpdatePriceListItemRequest) returns (UpdatePriceListItemResponse) {
    option (google.api.http) = {
      put: "/v1/price-list-items/{id}"
      body: "*"
    };
  }

  rpc DeletePriceListItem (DeletePriceListItemRequest) returns (DeletePriceListItemResponse) {
    option (google.api.http) = {
      delete: "/v1/price-list-items/{id}"
    };
  }

  rpc ListPriceListItems (ListPriceListItemsRequest) returns (ListPriceListItemsResponse) {
    option (google.api.http) = {
      get: "/v1/price-list-items"
    };
  }

  rpc GetPriceListItemsByPriceList (GetPriceListItemsByPriceListRequest) returns (GetPriceListItemsByPriceListResponse) {
    option (google.api.http) = {
      get: "/v1/price-lists/{price_list_id}/items"
    };
  }

  // Medical Scheme Management
  rpc CreateMedicalScheme (CreateMedicalSchemeRequest) returns (CreateMedicalSchemeResponse) {
    option (google.api.http) = {
      post: "/v1/medical-schemes"
      body: "*"
    };
  }

  rpc GetMedicalScheme (GetMedicalSchemeRequest) returns (GetMedicalSchemeResponse) {
    option (google.api.http) = {
      get: "/v1/medical-schemes/{id}"
    };
  }

  rpc GetMedicalSchemeByName (GetMedicalSchemeByNameRequest) returns (GetMedicalSchemeResponse) {
    option (google.api.http) = {
      get: "/v1/medical-schemes/name/{name}"
    };
  }

  rpc UpdateMedicalScheme (UpdateMedicalSchemeRequest) returns (UpdateMedicalSchemeResponse) {
    option (google.api.http) = {
      put: "/v1/medical-schemes/{id}"
      body: "*"
    };
  }

  rpc ListMedicalSchemes (ListMedicalSchemesRequest) returns (ListMedicalSchemesResponse) {
    option (google.api.http) = {
      get: "/v1/medical-schemes"
    };
  }

  // Stock Quantities - NEW ENDPOINTS FOR PHARMACY SERVICE
  rpc GetStoreStockQuantities (GetStoreStockQuantitiesRequest) returns (GetStoreStockQuantitiesResponse) {
    option (google.api.http) = {
      get: "/v1/stores/{store_id}/stock-quantities"
    };
  }

  rpc GetItemQuantityInStore (GetItemQuantityInStoreRequest) returns (GetItemQuantityInStoreResponse) {
    option (google.api.http) = {
      get: "/v1/stock-quantities/stores/{store_id}/items/{item_id}"
    };
  }

  rpc ReduceStockInStore (ReduceStockInStoreRequest) returns (ReduceStockInStoreResponse) {
    option (google.api.http) = {
      post: "/v1/stock-quantities/reduce"
      body: "*"
    };
  }

  rpc UpdateBinLocation (UpdateBinLocationRequest) returns (UpdateBinLocationResponse) {
    option (google.api.http) = {
      put: "/v1/stock-quantities/bin-location"
      body: "*"
    };
  }
}

